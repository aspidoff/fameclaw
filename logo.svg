<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#F7C948"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946"/>
      <stop offset="100%" style="stop-color:#C1121F"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1A1A2E" stroke="#16213E" stroke-width="4"/>
  
  <!-- Star body -->
  <polygon points="256,80 290,190 405,190 312,255 340,368 256,300 172,368 200,255 107,190 222,190" 
           fill="url(#starGrad)" filter="url(#shadow)" stroke="#E8871E" stroke-width="2"/>
  
  <!-- Star inner highlight -->
  <polygon points="256,120 280,195 370,195 298,242 318,335 256,288 194,335 214,242 142,195 232,195" 
           fill="none" stroke="#FFF5D4" stroke-width="1" opacity="0.3"/>
  
  <!-- Left claw -->
  <g transform="translate(58, 175) rotate(-15)" fill="url(#clawGrad)" filter="url(#shadow)">
    <!-- Left claw arm -->
    <path d="M60,80 Q40,60 25,30 Q15,10 30,5 Q45,0 50,20 Q55,35 65,50 Q75,35 80,20 Q85,0 100,5 Q115,10 105,30 Q90,60 70,80 Z" 
          stroke="#8B0000" stroke-width="2"/>
    <!-- Left claw base -->
    <ellipse cx="65" cy="85" rx="20" ry="12" fill="#C1121F" stroke="#8B0000" stroke-width="1.5"/>
  </g>
  
  <!-- Right claw -->
  <g transform="translate(370, 175) rotate(15)" fill="url(#clawGrad)" filter="url(#shadow)">
    <!-- Right claw arm -->
    <path d="M60,80 Q40,60 25,30 Q15,10 30,5 Q45,0 50,20 Q55,35 65,50 Q75,35 80,20 Q85,0 100,5 Q115,10 105,30 Q90,60 70,80 Z" 
          stroke="#8B0000" stroke-width="2"/>
    <!-- Right claw base -->
    <ellipse cx="65" cy="85" rx="20" ry="12" fill="#C1121F" stroke="#8B0000" stroke-width="1.5"/>
  </g>
  
  <!-- Eyes on the star -->
  <ellipse cx="235" cy="210" rx="12" ry="14" fill="white"/>
  <ellipse cx="277" cy="210" rx="12" ry="14" fill="white"/>
  <circle cx="238" cy="212" r="6" fill="#1A1A2E"/>
  <circle cx="280" cy="212" r="6" fill="#1A1A2E"/>
  <circle cx="240" cy="210" r="2.5" fill="white"/>
  <circle cx="282" cy="210" r="2.5" fill="white"/>
  
  <!-- Confident smirk -->
  <path d="M240,238 Q256,252 272,238" fill="none" stroke="#1A1A2E" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#F7C948" letter-spacing="4">FAMECLAW</text>
</svg>
